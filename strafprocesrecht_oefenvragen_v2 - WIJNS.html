  <script>
    const questions = [{"question": "Tijdens een verhoor van een verdacht cat III wenst deze verdachte gebruik te maken van zijn recht om tijdens het verhoor documenten toe te voegen. De verdachte wenst schriftelijke communicatie toe te voegen tussen de advocaat van de tegenpartij en zijn eigen advocaat omdat daarin volgens verdachte zaken staan die gunstig zijn voor hem. U neemt de documenten in ontvangst en voegt deze bij het dossier. Mag dit?  Één keuze.", "options": ["Ja maar u dient deze onder gesloten omslag in beslag te nemen.", "Ja indien u de met het dossier belaste magistraat hierom om toestemming vraagt.", "Nee, dit mag niet omdat dit vertrouwelijke documenten tussen raadslieden zijn.", "Nee, dit mag niet zonder toestemming van de stafhouder van de Orde."], "correctIndices": [2]}, {"question": "In het kader van een lopend drugsonderzoek verhoort u de verdachte ten burele. De verdachte geeft u en burele schriftelijk toestemming tot huiszoeking ? Alvorens u de huiszoeking kunt aanvatten trekt de verdachte zijn toestemming in. U besluit een huiszoeking te doen op basis van art 6bis van de drugwetgeving. Kan u dit doen?  Één keuze.", "options": ["Neen, u hebt gekozen voor een huiszoeking met toestemming en kunt dus nadien niet overschakelen op een ander type huiszoeking.", "Ja, de drugwetgeving voorziet die mogelijkheid en gelet op de elementen in uw onderzoek hebt u redenen om aan te nemen dat er in de woning van verdachte drugs gestockeerd zijn.", "Neen want de heterdaadsituatie is afgelopen.", "Neen, u kunt wel een medebewoner van verdachte om toestemming vragen."], "correctIndices": [1]}, {"question": "Wanneer kan een OGP een huiszoeking op basis van heterdaad uitvoeren?  Één keuze.", "options": ["Altijd", "Alleen wanneer het een misdaad of wanbedrijf betreft.", "Alleen tijdens de uren van de huiszoeking, tussen 05u en 21u.", "Nooit, het betreft immers geen HPK"], "correctIndices": [3]}, {"question": "Mevrouw X en meneer Y hebben een affectieve relatie en  te staan ten voordele van een onderzoeksrechter in een ander arrondissement.", "Heeft exclusieve bevoegdheden voor bijzondere opsporingsmethoden.", "Is als zesde procureur-generaal volwaardig lid van het College van procureurs-generaal.", "Kan opsporingsonderzoeken evoceren, zonder dat de procureur-generaal daar een rechtsmiddel tegen heeft."], "correctIndices": [3]}, {"question": "Op dinsdag 29 november 2019 krijgt u van PDK De Coster de machtiging om op het internet contact te onderhouden met een persoon die verdacht wordt van terreuractiviteiten. In een eerste fase krijgt u bijstand van een islamoloog. Nadat u zich een fictieve identiteit heeft toegekend start u met uw contact. Na enkele dagen post u in een forum een melding over het plannen van een eventuele terroristische aanslag. U bent er zich van bewust dat dit een strafbaar feit is maar u doet dit om het vertrouwen te winnen van uw verdacht contactpersoon. Duid het juiste antwoord aan:  Één keuze.", "options": ["Het is altijd toegelaten om strafbare feiten te plegen gedurende de eerste drie maanden van de infiltratie light.", "Tijdens de infiltratie light kan u strafbare feiten plegen mits uitdrukkelijke toestemming van de procureur des Konings.", "Het is nooit toegelaten om strafbare feiten te plegen tijdens de infiltratie light.", "Geen van bovenstaande."], "correctIndices": [1]}, {"question": "U bent rechercheur (OGP) bij de PZ LRH HASSELT. Tijdens een huiszoeking in het kader van een netwerk kinderpornografie heeft u een computer in beslag genomen. De RCCU analyseert de computer en meldt u dat er sporen zijn naar een server die in Brugge gelokaliseerd is bij de firma hiddenserversdedicated.com. Op deze server zouden duizenden foto’s staan met kinderpornografisch karakter. Omwille van het belang van het onderzoek wil u deze data zo snel mogelijk laten blokkeren. Wat kan u als officier van gerechtelijke politie ondernemen? Één keuze.", "options": ["U neemt telefonisch contact op met de verantwoordelijke ntiteiten van de anonieme getuigen.", "Geen van bovenstaande."], "correctIndices": [2]}, {"question": "Huiszoeking heterdaad Tijdens een reguliere patrouille intercepteert een interventieploeg een verdacht voertuig met daarin  Één persoon. Uit nadere controle blijkt de bestuurder van het voertuig gekend voor drugsbezit (gebruikershoeveelheid cannabis). De vaststellers beslissen betrokkene te fouilleren en het voertuig te doorzoeken. Er wordt uiteindelijk in een sporttas een zak met wit poeder gevonden. Dit blijkt 30 gram cocaïne te zijn. De vaststellende inspecteurs willen weten of de verdachte nog drugs in zijn woning heeft. Ze rijden met betrokkene naar zijn woning, vragen zijn huissleutel en beginnen vervolgens met de doorzoeking van de woning. Mag dit?  Één keuze.", "options": ["Ja, geen probleem. Het bezit van verdovende middelen is een voortdurend misdrijf en op basis van heterdaad mag elke politieambtenaar een woning doorzoeken naar verdovende middelen. Dit alles moet duidelijk geacteerd worden in een proces-verbaal van huiszoeking.", "Ja, maar na de huiszoeking moet er een verhoor van betrokkene worden afgenomen waarin hij verklaart dat hij de toestemming heeft verleend tot het doorzoeken van zijn woning.", "Nee, bij een dergelijke huiszoeking moet er steeds een officier van gerechtelijke politie aanwezig zijn. Deze kan op basis van heterdaad de woning betreden.", "Nee, er moet altijd eerst contact worden opgenomen met de magistraat met dienst. Hij/zij moet vervolgens via een mini-onderzoek een huiszoekingsmandaat vragen bij de onderzoeksrechter. Met dit mandaat kan de woning vervolgens doorzocht worden door gelijke welke politieambtenaar."], "correctIndices": [2]}, {"question": "DNA Indien de onderzoeksrechter u de opdracht geeft om onder dwang een DNA-referentiestaal af te nemen van een persoon die betrokken is in een strafzaak en tegen wie er aanwijzingen van schuld bestaan (feiten strafbaar met maximumstraf van vijf jaar), welke mogelijkheden heb je dan tijstelling. (evocatie / heterdaad)"], "correctIndices": [1]}, {"question": "Welke stelling is correct?  Één keuze.", "options": ["Door een delegatie van de Onderzoeksrechter kan een OGP/HPK opdrachten uitvoeren waarvoor hij anders niet bevoegd is", "De PdK kan een minderjarige niet weigeren om een kopie van zijn/haar verhoor mee te geven.", "Informatie gekregen van geheime bronnen mag enkel mondeling worden overgemaakt aan het parket omdat ander de bron niet geheim kan blijven.", "Het opsporingsrecht van de Procureur des Konings houdt in dat het parket een opsporingsonderzoek kan instellen wanneer er vermoedelijk een misdrijf is gepleegd. (plicht = moet)"], "correctIndices": [0]}, {"question": "Bij het uitvoeren van een reglementaire huiszoeking bij de verdachte thuis vind ik een gesloten brief opgesteld door de verdachte gericht aan een derde, de postzegel en het adres werden reeds aangebracht. Wie is gemachtigd om deze brief te openen, rekening houdend met het briefgeheim (art. 460 SWB)? Één keuze.", "options": ["De onderzoeksrechter is gemachtigd om de brief te openen.", "De Procureur des Konings is gemachtigd de brief te openen ingeval van heterdaad.", "iedereen die op een wettige wijze het stuk in beslag genomen heeft, want het briefgeheim geldt pas nadat het stuk werd toevertrouwd aan de postoperator."], "correctIndices": [2]}, {"question": "In welke omstandigheden is een valse getuigenis (die de waarheid vervalst) strafbaar ? Één keuze.", "options": ["Wanneer deze valse getuigenis wordt afgelegd ten overstaan van de politiediensten (zonder eed)", "Wanneer deze valse getuigenis wordt afgelegd ten overstaan van de Onderzoeksrechter (zonder eed)", "Wanneer deze valse getuigenis wordt afgelegd ten overstaan van het vonnisgerecht (met eed)", "Nooit."], "correctIndices": [2]}, {"question": "Het aannemen van het statuut van benadeelde persoon of zich burgerlijke partij stellen als slachtoffer van een misdrijf, er is een wezenlijk verschil tussen beiden. Welke van onderstaande beweringen is volledig correct?  Één keuze.", "options": ["De benadeelde persoon heeft het recht om bijgestaan of vertegenwoordigd te worden door een advocaat, kan vragen om een document te doen toevoegen aan het dossier en heeft recht op een inzage van het dossier. (enkel verzoek)", "De burgerlijke partijstelling reikt veel verder dan het statuut van benadeelde persoon. De burgerlijke partijstelling kan gebeuren in elke stand van het geding voor het sluiten van de debatten. De persoon die zich burgerlijke partij heeft gesteld kan rechtsmiddelen instellen, kan hoger beroep instellen tegen beslissingen van de raadkamer, de KI of beschikt over de mogelijkheid tot Cassatieberoep. De burgerlijke partij kan inzage vragen in het dossier en heeft tevens het recht om bijkomende opsporings- of onderzoekshandelingen te vragen.", "Een slachtoffer dat zich burgerlijke partij heeft gesteld heeft recht op kosteloze bijstand van een advocaat. De kosten voor de raadsman worden sowieso beschouwd als gerechtskosten."], "correctIndices": [1]}, {"question": "Het wetboek van strafvordering schrijft voor in welke gevallen een politieambtenaar nominatief moet worden aangewezen door een magistraat voor de uitvoering van een opdracht. In welk van onderstaande gevallen wordt dit niet voorgeschreven?  Één keuze.", "options": ["Opdracht tot audiovisueel verhoor van een meerderjarige.", "Opdracht tot audiovisueel verhoor van een minderjarige..", "Mandaat tot huiszoeking.", "Machtiging tot afluistermaatregel."], "correctIndices": [2]}, {"question": "Wie heeft in het kader van heterdaad de mogelijkheid om zijn hoedanigheid OGP toe te passen? Wat is fout?  Één keuze.", "options": ["De procureur des Konings.", "De officieren van gerechtelijke politie.", "De Federaal Procureur", "De onderzoeksrechter is niet bevoegd gezien hij sinds de wet Franchimont geen officier van gerechtelijke politie meer is."], "correctIndices": [3]}, {"question": "Artikel 47bis § 1,4 Sv. regelt de situaties waarbij een verhoorde zich in een andere taal dan die van de procedure wenst uit te drukken. Wat is fout?  Één keuze.", "options": ["Indien een in de hoedanigheid van slachtoffer ondervraagde persoon de taal van de procedure niet verstaat of spreekt of indien hij lijdt aan gehoor- of spraakstoornissen, wordt een beroep gedaan op een beëdigd tolk tijdens het verhoor. Indien geen enkele tolk beschikbaar is, wordt de ondervraagde persoon gevraagd zelf zijn verklaring te noteren.", "Indien een in de hoedanigheid van verdachte ondervraagde persoon de taal van de procedure niet verstaat of spreekt of indien hij lijdt aan gehoor- of spraakstoornissen, wordt een beroep gedaan op een beëdigd tolk tijdens het verhoor. Indien geen enkele tolk beschikbaar is, wordt de ondervraagde persoon gevraagd zelf zijn verklaring te noteren.", "Indien een in andere hoedanigheid dan slachtoffer of verdachte ondervraagde persoon de taal van de procedure niet verstaat of spreekt of indien hij lijdt aan gehoor- of spraakstoornissen, wordt ofwel een beroep gedaan op een beëdigd tolk, ofwel worden zijn verklaringen genoteerd in zijn taal, ofwel wordt hij gevraagd zelf te noteren.", "Bij elke ondervraagde persoon, los van zijn hoedanigheid, die de taal van de procedure niet verstaat of spreekt of indien hij lijdt aan gehoor- of spraakstoornissen, wordt ofwel een beroep gedaan op een beëdigd tolk, ofwel worden zijn verklaringen genoteerd in zijn taal, ofwel wordt hij gevraagd zelf te noteren."], "correctIndices": [3]}, {"question": "TONGEREN - De kamer van inbeschuldigingstelling in Antwerpen heeft vrijdag de aanhouding bevestigd van de Tongerse parketmagistraat Dominique R. (49), die eerder deze week werd opgepakt in een onderzoek naar gesjoemel met tweedehandswagens. (Het Nieuwsblad 05/07/2019). Welke instantie is bevoegd voor het strafonderzoek?  Één keuze.", "options": ["Federaal Parket.", "Parket bij de Procureur-Generaal.", "Tuchtmagistraat.", "Parket van de procureur des Konings."], "correctIndices": [1]}, {"question": "Agenten in Antwerpen zullen voortaan auto’s van roekeloze bestuurders meteen in beslag kunnen nemen. Zonder dat het gerecht daarbij aan te pas moet komen. Je kan dus niet in beroep gaan. Het schepencollege heeft het reglement daarover gisteren goedgekeurd. “Perfect legaal”, zegt Antwerps burgemeester Bart De Wever (N-VA) aan VTM NIEUWS. (HLN 13/04/19). Deze takeling betreft… Één keuze.", "options": ["Een gerechtelijke takeling onder verantwoordelijkheid van de procureur des Konings. De kosten betreffen gerechtskosten.", "Een bestuurlijke takeling onder verantwoordelijkheid van de OBP. De kosten zijn gerechtskosten.", "Een gerechtelijke takeling onder verantwoordelijkheid van de procureur des Konings. De kosten zijn ten laste van de eigenaar", "Een bestuurlijke takeling onder verantwoordelijkheid van de OBP. De kosten zijn ten laste van de eigenaar."], "correctIndices": [3]}, {"question": "Een 67-jarige Fransman is zondag opgepakt in een goudwinkel aan het Centraal Station in Antwerpen. Hij kwam al maanden gestolen goud verkopen in Antwerpse winkels. Ook de zaakvoerder van een winkel werd meegenomen.  (HLN 01/07/19) Je wenst, als lid van de PZ Antwerpen, een Fransman als verdachte te verhoren in de Franse taal. Welke optie hieronder is juist?  Één keuze.", "options": ["Je spreekt een aardig mondje Frans en noteert de verklaring dan ook in het Frans.", "Je mag alleen verhoren met een tolk.", "Je laat de Fransman zelf zijn verklaring noteren indien geen tolk ter beschikking is."], "correctIndices": [2]}, {"question": "Na een arrestatie van een verdachte moet er na maximum 48 uur een beslissing genomen worden over de verdere aanhouding door de OR. Op welk ogenblik is de maximum termijn van 48 uur na het uur van arrestatie bereikt?  Één keuze.", "options": ["Op het ogenblik dat de verdachte kennis neemt van zijn aanhouding en het afgeleverde mandaat ondertekent.", "Op het ogenblik dat het aanhoudingsmandaat betekend wordt door de griffier van de Onderzoeksrechter.", "Op het ogenblik dat de Onderzoeksrechter het afgeleverde aanhoudingsmandaat ondertekent.", "Op het ogenblik dat de verdachte in de gevangenis wordt afgeleverd en de griffie van de gevangenis een ontvangstbewijs ondertekent."], "correctIndices": [1]}, {"question": "Welke uitspraak met betrekking tot de mini-instructie is correct?", "options": ["In een opsporingsonderzoek heeft het OM buiten heterdaad in alle gevallen een mini-instructie nodig voor de toepassing van art 88 bis Sv. (opvragen telefoongegevens). (klager elektr comm)", "In een opsporingsonderzoek heeft het OM buiten heterdaad in alle gevallen een mini-instructie nodig voor een onderzoek aan het lichaam. (toestm", "In een opsporingsonderzoek heeft het OM buiten heterdaad in alle gevallen een mini-instructie nodig voor de afname van DNA onder dwang.", "In een opsporingsonderzoek heeft het OM buiten heterdaad in alle gevallen een mini-instructie nodig voor het uitvoeren van een autopsie."], "correctIndices": [2]}, {"question": "Het afnemen van een verhoor ‘toestemming tot afname van DNA’ van een verdachte, die NIET van zijn vrijheid benomen is verloopt conform : Één keuze.", "options": ["Salduz categorie 2.", "Salduz categorie 3.", "Salduz categorie 4.", "Zonder toepassing van Salduz."], "correctIndices": [3]}, {"question": "In België geldt een accusatoire procesvorm. Wat houdt dit in? Één keuze.", "options": ["Er is een gedeelde bewijslast.", "De bewijslast rust op de beklaagde.", "De bewijslast rust op de vervolgende (of eisende) partij."], "correctIndices": [2]}, {"question": "In het kader van de voorlopige hechtenis wordt man X op 8 november 2019 aangehouden. Op 12 november 2019 verschijnt hij voor de raadkamer. De raadkamer beslist dat het bevel rechtmatig is en dat de voorlopige hechtenis dient gehandhaafd te worden. Op 10 december beslist de raadkamer om het bevel tot aanhouding te verlengen. Man X is niet akkoord met de beslissing van de raadkamer en tekent beroep aan. Welk antwoord is juist? Één keuze.", "options": ["Beroep is mogelijk bij de kamer van inbeschuldigingstelling.", "Tegen een beslissing van de raadkamer is enkel beroep mogelijk bij de onderzoeksrechter die het bevel tot aanhouding heeft uitgevoerd. Hij kan eventueel overgaan tot een handlichting.", "De wettelijke termijnen van de voorlopige hechtenis zijn overschreden. Dit is een procedurefout waardoor man X in vrijheid gesteld moet worden.", "Tegen een beslissing van de raadkamer is geen beroep mogelijk."], "correctIndices": [0]}, {"question": "De regeling van de rechtspleging. Welke stelling is niet juist? Één keuze.", "options": ["Bij de regeling van de rechtspleging controleert de raadkamer de regelmatigheid van het onderzoek en van de onderzoekshandelingen. Zij oordeelt niet of de tenlastelegging bewezen is.", "Wanneer de onderzoeksrechter van oordeel is dat het onderzoek is beëindigd maakt hij het dossier over aan de procureur des Konings. Dit is de beschikking tot mededeling. Als de procureur des Konings oordeelt dat het onderzoek volledig is, maakt hij de eindvordering op waardoor de zaak voor de raadkamer wordt gebracht. De procureur vordert dus de regeling van de rechtspleging door de raadkamer.", "Wanneer er onvoldoende bezwaren zijn kan de raadkamer de buitenvervolgingstelling bevelen. De buitenvervolgingstelling maakt een voorlopig einde aan het onderzoek. Het initiatief voor de heropening van het onderzoek ligt enkel bij het openbaar ministerie.", "Wanneer er voldoende bezwaren zijn tegen de verdachte dan wordt de zaak naar het vonnisgerecht verwezen (beschikking tot verwijzing). Wanneer het feit strafbaar is met een criminele straf en correctionaliseren onmogelijk is of niet wenselijk, verwijst de raadkamer de zaak rechtstreeks door naar het hof van assisen."], "correctIndices": [3]}, {"question": "Ik betreed, als OGP/HPK, een pand met een bevel tot huiszoeking. De bewoner, zijn vrouw en zijn 3 minderjarige kinderen zijn aanwezig. Welke van onderstaande handelingen behoren tot mijn ambtsplichten?  Één keuze.", "options": ["Ik ben enkel verplicht om de aanwezige personen in te lichten over het mandaat tot huiszoeking.", "Ik ben verplicht om al de aanwezigen het mandaat te laten handtekenen ter kennisname.", "Ik ben verplicht om 1 van de meerderjarige aanwezigen het mandaat te laten handtekenen ter kennisname.", "Ik ben verplicht om toe te staan dat de aanwezigen een kopie of foto mogen maken van het mandaat."], "correctIndices": [0]}, {"question": "De wettelijke termijn werd verlengd naar 48 uren, maar blijft behouden op 24 uren voor: Één keuze.", "options": ["Bevelen tot aanhouding bij verstek.", "Bevelen tot medebrenging .", "Bevelen tot aanhouding.", "Geen van bovenstaande."], "correctIndices": [3]}, {"question": "Verhoor van getuigen, wat is correct:  Één keuze.", "options": ["Personen die door het beroepsgeheim zijn gehouden (art 458 Sw) mogen weigeren een verklaring af te leggen. Ze moeten echter wel verschijnen doch moeten geen eed afleggen aangezien ze geen verklaring kunnen afleggen conform hun beroepsgeheim.", "Een getuige heeft alleen de verplichting om de eed af leggen en te verschijnen.", "Een kind beneden de leeftijd van 15 jaar moet geen eed afleggen."], "correctIndices": [2]}, {"question": "Krachtens art. 28septies Sv. (mini-onderzoek) kan de procureur des Konings de onderzoeksrechter vorderen (een) bepaalde onderzoekshandeling(en) te verrichten waarvoor alleen de onderzoeksrechter bevoegd is, zonder dat een gerechtelijk onderzoek wordt ingesteld.  Welke onderzoekshandeling valt hier NIET onder:  Één keuze.", "options": ["Het bevelen van een DNA-onderzoek?", "Het uitvaardigen van een bevel tot huiszoeking.", "Het uitvoeren van een autopsie."], "correctIndices": [1]}, {"question": "Wanneer eindigt de heterdaadprocedure? Één keuze.", "options": ["Wanneer de opsporingen gestaakt of onderbroken worden voor lange duur.", "Als de Procureur Des Konings verwittigd wordt. (niet noodz)", "Na een termijn van 24 uren. (geen wett. Gegeven)"], "correctIndices": [0]}, {"question": "Welke stelling is correct? Één keuze.", "options": ["Het verbod van subdelegatie is van toepassing bij een huiszoekingsmandaat.", "Het verbod van subdelegatie is van toepassing bij een huiszoeking heterdaad."], "correctIndices": [0]}, {"question": "De procureur des Konings kan de onderzoeksrechter vorderen voor het uitvoeren van een zogenaamd mini-onderzoek.  Één keuze.", "options": ["Om een autopsie te laten uitvoeren in het raam van een doodslag.", "Om een huiszoekingsbevel te krijgen in het raam van een diefstal in woning.", "Op voorwaarde dat hiervan slechts 1x toepassing wordt gemaakt tijdens het opsporingsonderzoek."], "correctIndices": [0]}, {"question": "Volgens de zogenaamde Antigoondoctrine wordt bij onregelmatig verkregen bewijselementen door de rechter steeds besloten tot de nietigheid. Één keuze.", "options": ["Altijd.", "Enkel wanneer de naleving van de betrokken vormvoorwaarde(n) uitdrukkelijk werd voorgeschreven op straffe van nietigheid, de betrouwbaarheid van het bewijselement werd aangetast of het gebruik van het bewijselement in strijd is met het recht op een eerlijk proces.", "Nooit."], "correctIndices": [1]}, {"question": "Een verdachte van 14 jaar kan toestemming geven voor de afname van een DNA-staal. A. Ja, op voorwaarde dat hij/zij wordt bijgestaan door een vertrouwenspersoon B. Nee, in geen geval  Één keuze.", "options": ["Ja, op voorwaarde dat hij/zij wordt bijgestaan door een vertrouwenspersoon.", "Nee, in geen geval. Dat gaat pas vanaf 16 jaar. (44septies – enkel vertrouwenspersoon in dat geval, dus klopt)"], "correctIndices": [1]}, {"question": "Wie kan er opgeroepen worden voor de rechtbank als ‘deskundige in strafzaken’? Één keuze.", "options": ["Buiten enkele beperkingen inzake leeftijd en dergelijke, hij/zij die als dusdanig door de magistraat wordt gekwalificeerd.", "Buiten enkele beperkingen inzake leeftijd en dergelijke, hij/zij die over de nodige diploma’s bezit over een bepaalde onderwerpen die aan bod komen tijdens de zitting.", "Buiten enkele beperkingen inzake leeftijd en dergelijke, hij/zij die over de nodige diploma’s bezit over een bepaalde onderwerpen die aan bod komen tijdens de zitting en gekwalificeerd werd door de voorzitter van de rechtbank.", "Buiten enkele beperkingen inzake leeftijd en dergelijke, hij/zij die over de nodige diploma’s bezit over een bepaalde onderwerpen die aan bod komen tijdens de zitting en gekwalificeerd werd door de voorzitter van de rechtbank en die de nodige testen heeft afgelegd om zijn vakbekwaamheid te bewijzen voor de betrokken rechtbank."], "correctIndices": [0]}, {"question": "Indien een verdachte werd uitgenodigd -Salduz 3 (uitnodiging + documenten 'verklaring rechten') - om verhoord te worden. Dient de verdachte dan een afstandsverklaring te tekenen alvorens het verhoor aan te vangen, stel dat hij zegt geen advocaat te hebben geraadpleegd en er ook geen wenst tijdens het verhoor? Één keuze.", "options": ["Ja, dit dient altijd te worden ondertekend voor een verhoor -Salduz 3- ook al werd hij correct uitgenodigd. Dit document dient ondertekend bijgevoegd te worden bij het proces-verbaal van verhoor en de datum van de ondertekening dient overeen te komen met de datum van het verhoor.", "Ja, dit dient altijd te worden ondertekend voor een verhoor -Salduz 3- ook al werd hij correct uitgenodigd. Dit document dient ondertekend bijgevoegd te worden bij het proces-verbaal van verhoor en de datum van de ondertekening dient overeen te komen met de datum van het verhoor.", "Nee, eenmaal correct uitgenodigd Salduz 3 (uitnodiging + documenten 'verklaring rechten') dient dit niet nogmaals gevraagd te worden. De documenten van uitnodiging dienen wel bijgevoegd te worden als bijlage aan het proces-verbaal van verhoor."], "correctIndices": [2]}, {"question": "Huiszoeking met bevel, uitvoeringsvoorwaarden en praktische richtlijnen (welke zijn fout?). Één keuze.", "options": ["Indien de verdachte werd aangehouden geschiedt de huiszoeking in zijn aanwezigheid of, indien hij er niet bij aanwezig wil of kan zijn, in de aanwezigheid van zijn gemachtigde (bijvoorbeeld zijn advocaat). Deze voorwaarde is echter niet op straffe van nietigheid voorgeschreven.", "De huiszoeking moet beperkt blijven tot voorwerpen die betrekking hebben op het misdrijf dat aanleiding heeft gegeven tot de huiszoeking. Het zoeken naar bewijselementen van gepleegde misdrijven die niet in het huiszoekingsbevel zijn opgenomen, is onwettelijk. Dit geldt echter alleen voor AGP’s, de OGP’s mogen, indien ze geldig in de woning zijn, wel actief zoeken naar zaken die niet op het huiszoekingsbevel vermeld staan.", "De OGP die de huiszoeking uitvoert kan zich laten bijstaan door AGP’s. Hij zorgt ervoor dat hij gedurende de hele duur van de huiszoeking aanwezig is."], "correctIndices": [1]}, {"question": "Volgens art. 28septies van het wetboek van strafvordering kan de procureur des Konings de onderzoeksrechter vorderen een onderzoekshandeling te verrichten waarvoor alleen de onderzoeksrechter bevoegd is, zonder dat een gerechtelijk onderzoek wordt ingesteld, met uitzondering van: Één keuze.", "options": ["Een inkijkoperatie in een private plaats, een aanhoudingsbevel, een huiszoeking, een volledig anonieme getuigenis, een observatie met technische middelen om zicht te verwerven in een woning en zijn aanhorigheden en het, met een heimelijk oogmerk, met technische middelen onderscheppen van niet voor het publiek toegankelijke communicatie of gegevens van een informaticasysteem.", "Een inkijkoperatie in een private plaats, een aanhoudingsbevel, een volledig anonieme getuigenis, een observatie met technische middelen om zicht te verwerven in een woning en zijn aanhorigheden en het, met een heimelijk oogmerk, met technische middelen onderscheppen van niet voor het publiek toegankelijke communicatie of gegevens van een informaticasysteem.", "Een inkijkoperatie in een private plaats, een aanhoudingsbevel, een huiszoeking, een anonieme getuigenis, een observatie met technische middelen om zicht te verwerven in een woning en zijn aanhorigheden en het, met een heimelijk oogmerk, met technische middelen onderscheppen van niet voor het publiek toegankelijke communicatie of gegevens van een informaticasysteem.", "Geen van voorgaande."], "correctIndices": [0]}, {"question": "Het is vrijdagavond, omstreeks 21:15 uur. De 101-centrale wordt gebeld door een geldkoerier die zonet het slachtoffer is geworden van een diefstal met geweld in de Pelikaanstraat. De dader, een man van ongeveer 35 jaar, heeft de koerier in gebrekkig Nederlands verplicht zijn geldtas te overhandigen onder bedreiging van een mes en heeft hem bovendien enkele slagen toegebracht. De dader is vervolgens gevlucht met een donkergrijze Mercedes met nummerplaat 1-ABC-123 en dit in de richting van de Plantin en Moretuslei. Een aanstormende interventieploeg van de PZ Antwerpen (met OGP/HPK) merkt het voertuig met nummerplaat 1-ABC-123 op ter hoogte van het stadspark. Dit voertuig rijdt met hoge snelheid richting Frankrijklei. Voormelde interventieploeg zet de achtervolging in. Via de dispatching wordt de eigenaar van het voertuig geïdentificeerd als Sergei KOLINSKY, geboren op 12/01/1984 te Novosibirsk (Siberië, Russische Federatie), ingeschreven te Louizastraat 15A, 2000 Antwerpen. Betrokkene is ANG-gekend voor heel wat drugsfeiten, zware diefstallen en enkele feiten van slagen of verwondingen. De dispatching roept onmiddellijk de beelden van de camera’s in de Pelikaanstraat op en vergelijkt de gefilmde dader met de foto van KOLINSKY in het RRN. De dader lijkt zeer sterk op KOLINSKY. Na een korte achtervolging stopt het voertuig bruusk in de Louizastraat ter hoogte van het huisnummer 15A en de bestuurder van het voertuig vlucht met buit en getrokken mes naar binnen en vergeet daarbij de voordeur correct af te sluiten. Onze interventieploeg stijgt onmiddellijk uit en heeft inmiddels versterking gekregen van 2 extra ploegen. Er dient als volgt te worden gehandeld: Één keuze.", "options": ["Men bevriest de toestand en verwittigt het Parket, die een onderzoekrechter zal vorderen voor een aanhoudingsmandaat.", "Men bevriest de toestand en verwittigt de substituut met wacht, die een onderzoekrechter zal vorderen voor een huiszoekingsmandaat, dat slechts vanaf zaterdagmorgen 05:00 uur zal kunnen worden uitgevoerd door de opgaande OGP/HPK.", "Men bevindt zich in een klaar en duidelijk geval van een op heterdaad ontdekte misdaad, waarbij de aanwezige OGP/HPK kan overgaan tot arrestatie van de dader en daartoe bevoegd is de woning van de dader te betreden met het oog op diens arrestatie. Het tijdstip vormt geen belemmering. Uiteraard gebeurt dit niet zonder de nodige veiligheidsmaatregelen te treffen voor het personeel en mits het instellen van een veiligheidsperimeter rond de woning teneinde de vlucht van de dader te verhinderen.", "Geen van voorgaande handelingen is correct."], "correctIndices": [2]}, {"question": "Een jongeman van 17 jaar wordt van zijn vrijheid beroofd ingevolge de verkrachting van een 13-jarig meisje in het Citadelpark in Gent. Hij dient na overbrenging ten burele te worden verhoord. Één keuze.", "options": ["Het verhoor kan zonder advocaat, als een vertrouwenspersoon aanwezig is.", "Het verhoor kan enkel in aanwezigheid van zijn/een advocaat.", "Het verhoor kan zonder advocaat, als de jongeman schriftelijk afstand heeft gedaan van zijn recht hierop.", "Geen van voorgaande is correct."], "correctIndices": [1]}, {"question": "Sinds de Kerstwet 2016 zijn de termijnen voor de te vorderen gegevens ter identificatie van communicatie aangepast. Welke stelling(en) is/zijn juist? Één keuze.", "options": ["Voor strafbare feiten die een correctionele hoofdgevangenisstraf van een jaar of een zwaardere straf tot gevolg kunnen hebben, kan de PDK de gegevens vorderen voor een periode van 12 maanden voorafgaand aan zijn beslissing.", "Voor strafbare feiten die geen correctionele jk ter plaatse, zolang hij er maar voor 21u is, anders moet de zoeking stopgezet worden."], "correctIndices": [1]}, {"question": "Welke bijzondere opsporingsmethode(n) staat/staan NIET onder controle van de KI? Één keuze.", "options": ["Observatie en Informantenwerking.", "Observatie.", "Infiltratie en Burgerinfiltratie.", "Informantenwerking."], "correctIndices": [3]}, {"question": "Als men spreekt over de ‘nationale DNA-gegevensdatabanken’, over welke databanken heeft men het dan? Één keuze.", "options": ["Databanken Criminalistiek, Veroordeelden, Vermiste personen en Intervenanten.", "Databanken Criminalistiek, Veroordeelden en Verdachten.", "Databanken Criminalistiek, Veroordeelden en Vermiste personen.", "Databanken Veroordeelden, Verdachten, Vermiste personen en Intervenanten."], "correctIndices": [0]}, {"question": "Wie kan er buiten de gevallen van een op heterdaad ontdekt (of een als zodanig beschouwd) misdrijf en het geval wanneer een meerderjarige schriftelijk toestemming geeft, een onderzoek aan het lichaam bevelen? Één keuze.", "options": ["Pdk en OR.", "OR en KI.", "OR, KI en Rechtbank of Hof dat kennis neemt van het Wb of Md.", "OR en Rechtbank of Hof dat kennis neemt van het Wb of Md."], "correctIndices": [2]}, {"question": "Meneer X is slachtoffer geworden van een misdrijf en kreeg reeds het statuut “benadeelde persoon”. Hij is in het bezit van een document dat hij aan het strafdossier zou willen toevoegen. Kan dit? Één keuze.", "options": ["Ja, hij kan met zijn statuut van benadeelde persoon elk document dat hij nuttig acht aan het dossier laten toevoegen.", "Neen, hij dient zich eerst burgerlijke partij te stellen en kan dan elk document dat hij nuttig acht aan het dossier laten toevoegen.", "Ja, hij kan met zijn statuut van benadeelde persoon elk document dat hij nuttig acht aan het strafdossier laten toevoegen én hij kan zelfs vragen om bijkomende onderzoekshandelingen te laten verrichten."], "correctIndices": [0]}, {"question": "Tijdens een cat t IP-adres dat het in België is maar waar kan er niet onmiddellijk bepaald worden. Ook zegt hij dat deze is verbonden met de server aanwezig in het gebouw waarvoor de HZ met toestemming geldt en bijgevolg van daaruit te raadplegen valt, al moet de login dan wel gehackt worden. Wie is bevoegd om de opdracht tot netwerking zoeking te geven? Één keuze.", "options": ["De OGP.", "De PdK.", "De OR."], "correctIndices": [2]}, {"question": "In functie van een opsporingsonderzoek wordt er door de hiertoe bevoegde magistraat, zijnde de BOM-magistraat, een toestemming verleend om een woning te betreden voor een inkijkoperatie. Mag dat? Één keuze.", "options": ["Ja, de BOM-magistraat heeft op dit gebied ook de bevoegdheid.", "Ja, de BOM-magistraat heeft op dit gebied ook de bevoegdheid maar met uitzondering van het kabinet van een dokter en advocaat.", "Neen, enkel de OR kan op basis van art. 89ter SV de machtiging geven om een woning en aanhorigheden te betreden voor een inkijk."], "correctIndices": [2]}, {"question": "Wie   heeft   geen   recht   om   tijdens   een   gerechtelijk   onderzoek   een   verzoek   tot bijkomende onderzoekshandelingen in te dienen? Één keuze", "options": ["De benadeelde partij.", "De burgerlijke partij.", "De inverdenkinggestelde."], "correctIndices": [0]}, {"question": "Een man wordt verdacht  van betrokken te zijn bij een overval op basis van telefonieonderzoek en een getuigenverklaring. De verdachte komt met zijn advocaat zijn vliegtuigtickets en een kopie van zijn paspoort afleveren die moeten bewijzen dat hij in het buitenland was op het moment van de feiten. De politie gaat over tot het opstellen van... Één keuze.", "options": ["Een PV tot bewijswaarde van het tegendeel.", "Een PV tot bewijs van valsheid.", "Een PV met bewijswaarde van inlichting."], "correctIndices": [2]}, {"question": "De politie heeft ten allen tijde toegang tot huizen van ontucht, ook al lijken het woningen. Één keuze.", "options": ["Nee, gezien deze woningen een privé karakter vertonen, heeft men nooit toegang.", "Ja, maar enkel op de voorziene uren, zijnde tussen 05.00 uur en 21.00 uur.", "Ja, als er aan het bestaan van het huis van ontucht een zekere publieke, ruchtbaarheid is gegeven."], "correctIndices": [2]}, {"question": "Tijdens een proactief onderzoek, mag de onderzoeksrechter enkel tussenkomen voor het afleveren van: Één keuze.", "options": ["Een huiszoekingsbevel ten opzichte van de in beeld gebrachte verdachten.", "Een tapmaatregel ten opzichte van verdachten, gekend voor een criminele organisatie.", "Geen van bovenvernoemde antwoorden."], "correctIndices": [2]}, {"question": "De procureur des Konings kan, indien het openbaar belang het vereist, aan de pers gegevens verstrekken (art. 28 quinquies, §3 Sv.). Dit identiteit van de verdachten mag ... Één keuze.", "options": ["Nooit worden meegegeven, dit is ten strengste verboden gezien de wet op de privacy.", "Steeds volledig worden meegegeven.", "Zo weinig mogelijk worden vrijgegeven."], "correctIndices": [2]}, {"question": "De gerechtelijke triptiek is onderworpen aan enkele voorwaarden. Welke van onderstaande beweringen is niet correct? Één keuze.", "options": ["Indien een persoon ouder is dan 14 jaar dan moet de gerechtelijke triptiek verplicht afgenomen worden indien hij ter beschikking wordt gesteld van de Dienst Vreemdelingenzaken.", "Indien een persoon jonger is dan 14 jaar dan kan men de gerechtelijke triptiek afnemen indien de met het dossier belaste magistraat zijn uitdrukkelijke toestemming geeft. De toestemming moet altijd in het proces-verbaal verwerkt worden.", "Indien een persoon jonger is dan 14 jaar dan kan men de gerechtelijke triptiek afnemen indien de met het dossier belaste magistraat zijn uitdrukkelijke toestemming geeft. De toestemming moet enkel op verzoek van de minderjarige of zijn advocaat in het proces-verbaal verwerkt worden."], "correctIndices": [2]}, {"question": "Na hoeveel tijd in voorhechtenis te hebben gezeten, mag een verdachte vragen om in een openbare terechtzitting te verschijnen?  Één keuze.", "options": ["Indien hij een jaar na zijn vrijheidsberoving hierom vraagt.", "Indien hij zes maanden na zijn vrijheidsberoving, maar op voorwaarde dat zijn straf de vijftien jaar opsluiting niet te boven gaat, hierom vraagt.", "Indien de openbaarheid geen gevaar oplevert voor de goede zeden.", "Indien de openbaarheid geen gevaar oplevert voor de nationale veiligheid."], "correctIndices": [1]}, {"question": "Wanneer een bepaling uit een Belgische wet strijdig is met het EVRM: Één keuze.", "options": ["Dan is deze bepaling van het EVRM niet van toepassing in België zolang deze bepaling van het EVRM niet is opgenomen in een uitvoeringsbesluit in België.", "Wordt de Belgische bepaling opzij geschoven aangezien het EVRM voor alle landen uit de EU geldt.", "Wordt de Belgische bepaling opzij geschoven aangezien het EVRM een rechtstreekse werking heeft voor de landen die dit bekrachtigd hebben."], "correctIndices": [2]}, {"question": "Bij wie moet de gerechtelijke triptiek NIET verplicht afgenomen worden? Één keuze.", "options": ["Een 18-jarige persoon die van zijn vrijheid beroofd wordt.", "Een 15-jarige persoon die ter beschikking wordt gesteld van een gerechtelijke overheid of van de Dienst Vreemdelingenzaken.", "Een 45-jarige persoon die opgesloten dient te worden in een strafinrichting als gevolg van een gerechtelijk bevel of een gerechtelijke beslissing.", "In geen van bovenstaande gevallen."], "correctIndices": [3]}, {"question": "Binnen 2 weken vindt een muziekfestival plaats in de PZ. De OBP van dienst heeft beslist dat iedereen een veiligheidsfouille zal moeten ondergaan aan de ingang door de politiediensten. Wie mag deze veiligheidsfouille uitvoeren? Één keuze.", "options": ["Enkel personen van hetzelfde geslacht.", "Indien mogelijk uitgevoerd door personen van hetzelfde geslacht.", "Maakt niet uit, iedereen mag de veiligheidsfouille uitvoeren."], "correctIndices": [0]}, {"question": "Een groep studenten gaat naar een dagTD, georganiseerd door hun favoriete studentenclub. Na veel plezier en enkele glazen bier te drinken keren ze terug naar hun kotgebouw, waarin ieder een individuele kamer heeft. Wanneer een van de studenten op zijn bed in slaap is gevallen, vinden zijn vrienden dat dit moment voor de eeuwigheid dient bewaard te worden en willen ze met zijn GSM een foto van hem trekken. Ze gebruiken zijn vingerafdruk om de GSM te ontgrendelen en ontdekken tussen zijn foto’s kinderporno. In paniek bellen ze de 101 en leggen ze de situatie uit. Op welke manier kan er tussengekomen worden wanneer de andere studenten U bij aankomst de foto’s op de GSM tonen? Één keuze.", "options": ["Als OGP/HPK gaat U ter plaatse en mag U het kot van de student betreden op basis van heterdaad.", "Als inspecteur mag U het kot betreden, aangezien de student zijn deur niet op slot heeft gedaan en de andere studenten toch al binnen zijn geweest.", "U mag het kot niet betreden, aangezien de andere studenten de GSM op onrechtmatige wijze hebben ontgrendeld en het bewijs bij gevolg onrechtmatig is verkregen."], "correctIndices": [0]}, {"question": "Op de noodcentrale komt een oproep binnen van een vrouw die belt omdat ze is opgesloten door haar vriend in haar appartement. Ze geeft een adres door en de dispatch stuurt je ter plaatse. Aangekomen aan het appartement bel je, klop je aan en identificeer je je, maar je krijgt geen gehoor. Bij rondvraag bij de buren, blijkt er inderdaad een vrouw te wonen. Wat doe je? Één keuze.", "options": ["Je moet OGP/HPK zijn om op basis van hulpgeroep de woning te mogen betreden.", "Je probeert als inspecteur toegang te krijgen op basis van hulpgeroep.", "Je moet OBP zijn of in zijn opdracht handelen om op basis nakend onheil de woning te kunnen betreden."], "correctIndices": [1]}, {"question": "Een verzoek tot inzage in het dossier in een gerechtelijk onderzoek is onderworpen aan verschillende voorwaarden en procedures. Welke van onderstaande beweringen zijn niet correct? Één keuze.", "options": ["Een aangehouden inverdenkinggestelde persoon kan een verzoek indienen bij de OR om inzage te krijgen in van het deel van het dossier betreffende de feiten die tot de inverdenkingstelling hebben geleid.", "Een burgerlijke partij met een door de OR verkregen recht tot inzage in het dossier, kan nooit een afschrift krijgen van de delen van het dossier betreffende de feiten die tot de burgerlijke-partijstelling hebben geleid.", "Indien de OR nalaat binnen de maand uitspraak te doen over de aanvraag tot het recht tot inzage van het dossier of indien de griffier de positieve beschikking van de OR niet binnen de acht dagen per aangetekende brief of fax meedeelt aan de verzoeker, kan deze laatstgenoemde zich rechtstreeks wenden tot de KIB. De KIB zal zonder enig debat met de OR binnen de vijftien dagen uitspraak doen over de aanvraag.", "Indien een verzoekschrift tot inzage in het dossier is afgewezen, kan de verzoeker geen nieuw verzoekschrift indienen vooraleer een termijn van drie maanden is verstreken te rekenen van de laatste beslissing die betrekking heeft op hetzelfde voorwerp."], "correctIndices": [1]}, {"question": "Het einde van een gerechtelijk onderzoek wordt gekenmerkt door enkele procedures en voorwaarden. Welke van onderstaande beweringen zijn niet correct? Één keuze.", "options": ["Wanneer de OR oordeelt dat zijn onderzoek voltooid is, zendt hij het onderzoek terug door naar de PdK. Dit gebeurt via een ‘beschikking tot mededeling’.", "De Pdk kan aan de OR bijkomende onderzoekshandelingen vorderen alvorens hij de ‘regeling der rechtspleging’ door de raadkamer of de KIB vordert.", "De inverdenkinggestelde of de burgerlijke partij kunnen de OR verzoeken bijkomende onderzoekshandelingen te verrichten en dit zal de ‘regeling der rechtspleging’ schorsen voor vijftien dagen. (Art 127 + Art 61 quinquies)", "De raadkamer kan een persoonlijke verschijning van de betrokken partijen bevelen. Tegen deze beslissing staat geen enkel     function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      questions.forEach((q, qIndex) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = (qIndex + 1) + '. ' + q.question;
        qDiv.appendChild(qText);

        const answersUl = document.createElement('ul');
        answersUl.className = 'answers';

        const optionIndices = q.options.map((_, idx) => idx);
        shuffleArray(optionIndices);

        const nameGroup = 'q' + qIndex;
        let selectedSet = new Set();

        optionIndices.forEach((optIdx) => {
          const li = document.createElement('li');

          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = nameGroup;

          const label = document.createElement('span');
          label.textContent = q.options[optIdx];

          li.appendChild(radio);
          li.appendChild(label);

          li.addEventListener('click', () => {
            if (qIndex === 223) {
              if (selectedSet.has(optIdx)) {
                selectedSet.delete(optIdx);
                radio.checked = false;
              } else {
                selectedSet.add(optIdx);
                radio.checked = true;
              }

              const allLis = answersUl.querySelectorAll('li');
              allLis.forEach(el => {
                el.classList.remove('correct', 'incorrect');
              });

              if (selectedSet.size === q.correctIndices.length &&
                  q.correctIndices.every(ci => selectedSet.has(ci))) {
                allLis.forEach((el) => {
                  const optText = el.querySelector('span').textContent;
                  const idx = q.options.indexOf(optText);
                  if (q.correctIndices.includes(idx)) {
                    el.classList.add('correct');
                  }
                });
              } else if (selectedSet.size >= q.correctIndices.length) {
                allLis.forEach((el) => {
                  const optText = el.querySelector('span').textContent;
                  const idx = q.options.indexOf(optText);
                  if (q.correctIndices.includes(idx)) {
                    el.classList.add('correct');
                  } else if (selectedSet.has(idx)) {
                    el.classList.add('incorrect');
                  }
                });
              }
            } else {
              const allLis = answersUl.querySelectorAll('li');
              allLis.forEach(el => {
                el.classList.remove('correct', 'incorrect');
                const input = el.querySelector('input[type="radio"]');
                if (input) input.checked = false;
              });

              radio.checked = true;

              if (q.correctIndices.includes(optIdx)) {
                li.classList.add('correct');
              } else {
                li.classList.add('incorrect');

                q.correctIndices.forEach(ci => {
                  const liCorrect = Array.from(allLis).find(el => {
                    const span = el.querySelector('span');
                    return span && span.textContent === q.options[ci];
                  });
                  if (liCorrect) {
                    liCorrect.classList.add('correct');
                  }
                });
              }
            }
          });

          answersUl.appendChild(li);
        });

        qDiv.appendChild(answersUl);
        container.appendChild(qDiv);
      });
    }

    document.addEventListener('DOMContentLoaded', renderQuestions);
  </script>
